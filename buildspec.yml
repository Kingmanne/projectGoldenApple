version: 0.2

env:
  parameter-store:
    API_URL: /myapp/development/api-url

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - npm ci
      
  pre_build:
    commands:
      - echo "Running unit tests with coverage..."
      - npm run test:coverage
    finally:
      - echo "Pre-build phase completed"

  build:
    commands:
      - echo "Creating .env file..."
      - |
        printf "NODE_ENV=%s\nAPP_NAME=%s\nPORT=%s\nAPI_URL=%s\n" \
        "$NODE_ENV" "$APP_NAME" "$PORT" "$API_URL" > .env
      - echo "Build phase complete."
    finally:
      - echo "Build phase completed"

  post_build:
    commands:
      - echo "Running smoke tests..."
      - npm run test:smoke
    finally:
      - echo "Post-build phase completed"

cache:
  paths:
    - 'node_modules/**/*'
    - '.npm/**/*'

artifacts:
  files:
    - appspec.yml
    - .env
    - package.json
    - package-lock.json
    - 'public/**/*'
    - 'scripts/**/*'
    - server.js
    - smoke-test.js

cache:
  paths:
    - 'node_modules/**/*'