version: 0.2

env:
  variables:
    ENVIRONMENT: "development"       # set your environment
phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - npm install

  pre_build:
    commands:
      - echo "Fetching parameters for $ENVIRONMENT environment from SSM..."
      - export NODE_ENV=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/node-env --with-decryption --query 'Parameter.Value' --output text)
      - export APP_NAME=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/app-name --with-decryption --query 'Parameter.Value' --output text)
      - export PORT=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/port --with-decryption --query 'Parameter.Value' --output text)
      - export API_URL=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/api-url --with-decryption --query 'Parameter.Value' --output text)
      - echo "================================================"
      - echo "Building for Environment - $ENVIRONMENT"
      - echo "Node Environment - $NODE_ENV"
      - echo "App Name - $APP_NAME"
      - echo "Port - $PORT"
      - echo "API_URL - $API_URL"
      - echo "================================================"

  build:
    commands:
      - echo "Creating .env file..."
      - echo "NODE_ENV=$NODE_ENV" > .env
      - echo "APP_NAME=$APP_NAME" >> .env
      - echo "PORT=$PORT" >> .env
      - echo "API_URL=$API_URL" >> .env
      - echo ".env file created!"
      - cat .env
      - echo "Running unit tests with coverage..."
      - npm test -- --coverage      # build will fail if coverage <70%
      - echo "Running production build..."
      - npm run build

  post_build:
    commands:
      - echo "Running smoke tests..."
      - npm run test:smoke
      - echo "✅ Build completed successfully for $APP_NAME ($ENVIRONMENT)!"

artifacts:
  files:
    - appspec.yml
    - .env
    - package.json
    - package-lock.json
    - 'public/**/*'
    - 'scripts/**/*'
    - server.js
    - smoke-test.js
    - app.test.js
    - index.html
  name: sour-mango-$ENVIRONMENT-artifact
  exclude-paths:
    - node_modules/**/*
    - coverage/**/*
    - __tests__/**/*
    - .git/**/*
    - .gitignore
    - buildspec.yml
    - sour-mango-v1.zip

cache:
  paths:
    - 'node_modules/**/*'